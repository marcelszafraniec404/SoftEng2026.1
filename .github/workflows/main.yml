name: CI_CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # =========================================================================
  # BUILD - kompilacja na Ubuntu i Windows
  # =========================================================================
  build:
    name: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.20.0'

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        sudo apt-get install -y cmake ninja-build

    - name: Configure Windows
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        call "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvarsall.bat" x64
        choco install ninja

    - name: Set environment variables - Windows
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $env:LIB += ";C:\vcpkg\installed\x64-windows\lib"
        $env:INCLUDE += ";C:\vcpkg\installed\x64-windows\include"
        $env:Path += ";C:\Program Files (x86)\Common Files\Intel\OpenCL\bin\x64"
        echo "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "INCLUDE=$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CPATH=$env:CPATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "IFCPATH=$env:IFCPATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "LIB=$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "LIBPATH=$env:LIBPATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "LIBRARY_PATH=$env:LIBRARY_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Configure CMake
      run: cmake -G Ninja -S . -B build

    - name: Build
      run: cmake --build build

    # Po udanym budowaniu na Ubuntu pakujemy katalog build/ jako artefakt,
    # zeby kolejny job (test) mogl po nim odpalic ctest bez ponownej kompilacji.
    # Pakujemy w tar, bo upload-artifact gubi atrybut wykonywalnosci plikow.
    - name: Pack build directory (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: tar -czf build-ubuntu.tar.gz build/

    - name: Upload build artifact (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: build-ubuntu
        path: build-ubuntu.tar.gz
        retention-days: 1

  # =========================================================================
  # TEST - uruchomienie testow na Ubuntu (osobny job, zaleznosc od build)
  # =========================================================================
  test:
    name: test
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: build-ubuntu

    - name: Unpack build directory
      run: tar -xzf build-ubuntu.tar.gz

    # Katalog na raporty XML musi istniec PRZED uruchomieniem testow,
    # bo gtest nie tworzy go automatycznie.
    - name: Prepare reports directory
      run: mkdir -p build/gtest_reports

    - name: Run tests
      working-directory: build
      run: ctest -C Debug --output-on-failure --verbose
      env:
        # Trailing slash - to jest klucz: gtest interpretuje wartosc
        # konczaca sie slashem jako KATALOG i tworzy w nim osobny plik
        # XML dla kazdej binarki testowej (nazwany od targeta).
        # Bez slasha gtest traktuje to jako PLIK i kazda binarka nadpisuje
        # ten sam plik - byl to bug w poprzedniej wersji workflow.
        GTEST_OUTPUT: "xml:gtest_reports/"

    - name: List generated reports
      if: always()
      working-directory: build
      run: ls -la gtest_reports/ || echo "No reports generated"

    - name: Publish Test Report
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: "build/gtest_reports/*.xml"

  # =========================================================================
  # FORMAT CHECK - niezalezny od build/test
  # =========================================================================
  formatcheck:
    name: Check code format
    runs-on: ubuntu-22.04
    steps:
      - name: Install clang-format
        run: sudo apt install -y clang-format clang-format-14
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Give execute permission to clang_format.sh
        run: chmod +x ./clang_format.sh
      - name: Check code format
        run: ./clang_format.sh
